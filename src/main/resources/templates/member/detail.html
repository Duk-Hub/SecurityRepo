<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>내 정보</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
        .container { max-width: 720px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
        .title { margin: 0; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 12px; border-radius: 10px; text-decoration: none;
            border: 1px solid #ccc; background: #fff; color: #111; font-weight: 600;
        }
        .btn:hover { background: #f6f6f6; }
        .card { border: 1px solid #ddd; border-radius: 12px; padding: 18px; }
        .row { display: grid; grid-template-columns: 140px 1fr; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .row:last-child { border-bottom: 0; }
        .label { color: #555; font-weight: 700; }
        .value { color: #111; }
        .empty { color: #666; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h2 class="title">내 정보</h2>
        <a class="btn" th:href="@{/}">홈으로</a>
    </div>

    <div class="card" th:if="${response != null}">
        <div class="row">
            <div class="label">이름</div>
            <div class="value" th:text="${response.name}">name</div>
        </div>

        <div class="row">
            <div class="label">아이디</div>
            <div class="value" th:text="${response.username}">username</div>
        </div>

        <div class="row">
            <div class="label">가입일시</div>
            <div class="value" th:text="${response.joinedAt}">yyyy-MM-dd HH:mm:ss</div>
        </div>

        <div class="row">
            <div class="label">권한</div>
            <div class="value" th:text="${response.role}">ROLE</div>
        </div>
    </div>

    <div class="card empty" th:if="${response == null}">
        사용자 정보를 불러올 수 없습니다.
    </div>

</div>
</body>
</html>
