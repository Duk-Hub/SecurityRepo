<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원 목록</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
        .container { max-width: 920px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
        .title { margin: 0; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 12px; border-radius: 10px; text-decoration: none;
            border: 1px solid #ccc; background: #fff; color: #111; font-weight: 600;
        }
        .btn:hover { background: #f6f6f6; }
        .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { font-size: 0.95rem; color: #444; }
        .empty { padding: 14px; color: #666; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h2 class="title">회원 목록</h2>
        <a class="btn" th:href="@{/}">홈으로</a>
    </div>

    <div class="card">
        <table th:if="${members != null and !#lists.isEmpty(members)}">
            <thead>
            <tr>
                <th style="width: 60%;">이름</th>
                <th style="width: 40%;">가입일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${members}">
                <td th:text="${m.name}">name</td>
                <td th:text="${m.joinedDate}">yyyy-MM-dd</td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${members == null or #lists.isEmpty(members)}">
            표시할 회원이 없습니다.
        </div>
    </div>

</div>
</body>
</html>
