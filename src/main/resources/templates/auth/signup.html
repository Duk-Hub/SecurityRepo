<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원가입</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
        .container { max-width: 520px; margin: 0 auto; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 18px; }
        .field { margin: 12px 0; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .error { margin-top: 6px; color: #c40000; font-size: 0.92rem; }
        .global-error { background: #ffecec; border: 1px solid #ffb3b3; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
        button { width: 100%; padding: 10px; border: 0; border-radius: 8px; cursor: pointer; }
        .link { margin-top: 12px; text-align: center; }
        .link a { text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>회원가입</h2>

    <div class="card">
        <form th:action="@{/api/auth/signup}" th:object="${request}" method="post">

            <div class="global-error" th:if="${#fields.hasGlobalErrors()}">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <div class="field">
                <label for="name">이름</label>
                <input id="name" type="text" th:field="*{name}" autocomplete="name" />
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="field">
                <label for="username">아이디</label>
                <input id="username" type="text" th:field="*{username}" autocomplete="username" />
                <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="field">
                <label for="password">비밀번호</label>
                <input id="password" type="password" th:field="*{password}" autocomplete="new-password" />
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit">가입하기</button>
        </form>
    </div>
</div>
</body>
</html>
