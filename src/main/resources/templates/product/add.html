<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 추가</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
        .container { max-width: 560px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
        .title { margin: 0; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 12px; border-radius: 10px; text-decoration: none;
            border: 1px solid #ccc; background: #fff; color: #111; font-weight: 600;
        }
        .btn:hover { background: #f6f6f6; }
        .card { border: 1px solid #ddd; border-radius: 12px; padding: 18px; }
        .field { margin: 12px 0; }
        label { display: block; margin-bottom: 6px; font-weight: 700; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .error { margin-top: 6px; color: #c40000; font-size: 0.92rem; }
        .actions { display: flex; gap: 8px; margin-top: 14px; }
        .actions .btn { flex: 1; }
        button.btn { cursor: pointer; }
        .btn-primary { border-color: #111; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h2 class="title">상품 추가</h2>
        <a class="btn" th:href="@{/api/product/list}">목록으로</a>
    </div>

    <div class="card">
        <form th:action="@{/api/product/add}" th:object="${request}" method="post">

            <div class="field">
                <label for="name">상품명</label>
                <input id="name" type="text" th:field="*{name}" />
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="field">
                <label for="price">가격</label>
                <input id="price" type="number" step="1" min="0" th:field="*{price}" />
                <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="field">
                <label for="quantity">수량</label>
                <input id="quantity" type="number" step="1" min="0" th:field="*{quantity}" />
                <div class="error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
            </div>

            <div class="actions">
                <a class="btn" th:href="@{/api/product/list}">취소</a>
                <button class="btn btn-primary" type="submit">저장</button>
            </div>
        </form>
    </div>

</div>
</body>
</html>
