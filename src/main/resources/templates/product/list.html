<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 목록</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
        .container { max-width: 920px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
        .title { margin: 0; }
        .toolbar { display: flex; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 12px; border-radius: 10px; text-decoration: none;
            border: 1px solid #ccc; background: #fff; color: #111; font-weight: 600;
        }
        .btn:hover { background: #f6f6f6; }
        .btn-primary { border-color: #111; }
        .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { font-size: 0.95rem; color: #444; }
        .empty { padding: 14px; color: #666; }
        .num { text-align: right; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h2 class="title">상품 목록</h2>
        <div class="toolbar">
            <a class="btn" th:href="@{/}">홈으로</a>
            <a class="btn btn-primary" th:href="@{/product/add}">상품 추가</a>
        </div>
    </div>

    <div class="card">
        <table th:if="${products != null and !#lists.isEmpty(products)}">
            <thead>
            <tr>
                <th style="width: 50%;">상품명</th>
                <th style="width: 25%;" class="num">가격</th>
                <th style="width: 25%;" class="num">수량</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.name}">name</td>
                <td class="num" th:text="${p.price}">0</td>
                <td class="num" th:text="${p.quantity}">0</td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${products == null or #lists.isEmpty(products)}">
            표시할 상품이 없습니다.
        </div>
    </div>

</div>
</body>
</html>
